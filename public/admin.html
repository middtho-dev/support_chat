<style>

}.avatar.closed::after{background:var(--red)}.avatar.wait::after{background:var(--amber)}.tname{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tlast{margin-top:3px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.time{font-size:11px;color:var(--muted);white-space:nowrap}.badge{margin-top:6px;min-width:20px;height:20px;padding:0 6px;border-radius:99px;background:var(--blue);color:#041018;font-size:11px;font-weight:800;display:grid;place-items:center}.empty{padding:34px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5}

}.bubble img,.bubble video{max-width:280px;max-height:260px;border-radius:12px;display:block}.bubble audio{max-width:280px}.file{display:flex;gap:10px;align-items:center;color:inherit;text-decoration:none}.file-ico{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;background:rgba(56,189,248,.15);color:var(--blue)}.composer{padding:14px 18px;border-top:1px solid var(--line);background:rgba(18,24,33,.78);flex:0 0 auto}.typing{display:none;color:var(--muted);font-size:12px;margin:0;padding:8px 18px}.compose-row{display:flex;gap:10px;align-items:flex-end}.quick{width:42px;height:42px;border-radius:13px;background:var(--panel2);border:1px solid var(--line);color:var(--blue);font-weight:800;flex:0 0 auto}.composer textarea{flex:1;min-height:42px;max-height:140px;border-radius:13px;padding:11px 13px;resize:none}.send{width:42px;height:42px;border-radius:13px;background:var(--blue);color:#041018;font-weight:900;flex:0 0 auto}.hint{display:flex;justify-content:space-between;margin-top:7px;color:var(--muted);font-size:11px}.closed-note{padding:16px;text-align:center;color:var(--red);background:rgba(251,113,133,.06);border-top:1px solid rgba(251,113,133,.18)}
.panel{display:none;min-height:0;overflow:auto;padding:24px}.panel.on{display:block}.section{max-width:980px}.section h2{margin:0 0 6px;font-size:26px}.section p{margin:0 0 18px;color:var(--muted);line-height:1.5}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:rgba(18,24,33,.86);border:1px solid var(--line);border-radius:16px;padding:16px}.card h3{margin:0 0 12px;font-size:16px}.field{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}.field label,.check{font-size:13px;color:var(--soft);font-weight:700}.field input,.field textarea,.field select{width:100%;border-radius:12px;padding:10px 12px}.field textarea{min-height:90px;resize:vertical}.check{display:flex;align-items:center;gap:9px}.check input{width:18px;height:18px}.save{height:40px;padding:0 16px;border-radius:12px;background:var(--green);color:#041018;font-weight:900}.template-list{display:flex;flex-direction:column;gap:10px}.tpl{display:grid;grid-template-columns:160px minmax(0,1fr) auto;gap:10px}.tpl input{height:40px;border-radius:11px;padding:0 10px}.tpl button{width:40px;border-radius:11px;background:rgba(251,113,133,.12);color:var(--red)}.add{height:40px;padding:0 14px;border-radius:12px;background:var(--panel3);color:var(--text);font-weight:800}.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,12px);opacity:0;transition:.18s ease;padding:10px 14px;border-radius:99px;background:rgba(18,24,33,.95);border:1px solid var(--line);box-shadow:var(--shadow);color:var(--text);font-size:13px;z-index:60}.toast.on{opacity:1;transform:translate(-50%,0)}.pop{position:fixed;z-index:55;width:min(420px,calc(100vw - 24px));max-height:360px;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:8px}.pop button{display:block;width:100%;text-align:left;background:transparent;border-radius:12px;padding:10px}.pop button:hover{background:var(--panel2)}.pop b{display:block;color:var(--blue);font-size:12px}.pop span{display:block;margin-top:3px;color:var(--soft);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}@keyframes pop{from{opacity:.3;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(max-width:980px){.workspace{grid-template-columns:64px minmax(280px,1fr)}.main{position:fixed;inset:64px 0 0 64px;background:var(--bg);display:none;z-index:20}.main.open{display:flex}.back{display:grid}.side{border-right:0}.grid{grid-template-columns:1fr}.tpl{grid-template-columns:1fr}.tpl button{width:100%;height:38px}.top .brand p,.status span{display:none}.rail{padding:10px 6px}.navbtn{width:52px}}

/* 2026 admin polish: larger working UI, calmer motion, no pale seams */
:root{--bg:#070b12;--panel:#0e1724;--panel2:#142033;--panel3:#1c2b42;--line:rgba(226,232,240,.12);--text:#f3f7fb;--muted:#96a3b4;--soft:#c9d3df;--blue:#22d3ee;--blue2:#2563eb;--green:#2dd4bf;--red:#fb7185;--amber:#f59e0b;--violet:#818cf8;--shadow:0 24px 76px rgba(0,0,0,.44)}
html,body{background:linear-gradient(120deg,rgba(34,211,238,.11),transparent 30%),linear-gradient(240deg,rgba(129,140,248,.10),transparent 36%),linear-gradient(180deg,#050914,#08111e 50%,#050914)}
body::before{content:"";position:fixed;inset:-1px;background:linear-gradient(120deg,rgba(34,211,238,.11),transparent 30%),linear-gradient(240deg,rgba(129,140,248,.10),transparent 36%),linear-gradient(180deg,#050914,#08111e 50%,#050914);pointer-events:none;z-index:-1}
input,textarea,select{background:rgba(20,32,51,.92);border-color:rgba(226,232,240,.13)}
input:focus,textarea:focus,select:focus{border-color:rgba(34,211,238,.74);box-shadow:0 0 0 4px rgba(34,211,238,.13)}
.auth{background:transparent}
.auth-card{width:min(440px,100%);padding:36px;border-radius:22px;background:linear-gradient(180deg,rgba(16,26,42,.94),rgba(10,17,29,.94));border-color:var(--line)}
.auth-card input,.auth-card button{height:52px;border-radius:14px}
.logo{border-radius:13px;background:linear-gradient(135deg,#22d3ee,#2563eb);color:#061018;box-shadow:0 14px 36px rgba(37,99,235,.26)}
.app{background:linear-gradient(180deg,rgba(8,13,22,.96),rgba(7,11,18,.98));}
.top{height:72px;padding:0 22px;background:rgba(7,12,20,.9);border-bottom-color:var(--line);box-shadow:0 8px 34px rgba(0,0,0,.22)}
.top .logo{width:42px;height:42px}
.top h1{font-size:18px}.top p{font-size:12.5px}
.ghost,.danger,.okbtn,.save,.add{min-height:42px;border-radius:12px;transition:transform .14s ease,background .16s ease,border-color .16s ease}
.ghost:hover,.danger:hover,.okbtn:hover,.save:hover,.add:hover{transform:translateY(-1px)}
.workspace{grid-template-columns:84px minmax(360px,420px) minmax(0,1fr)}
.rail{padding:14px 12px;background:rgba(11,18,30,.92);border-right-color:var(--line)}
.navbtn{width:60px;height:58px;border-radius:16px;transition:transform .16s ease,background .16s ease,color .16s ease}
.navbtn:hover{transform:translateY(-1px);background:rgba(255,255,255,.045);color:var(--text)}
.navbtn.on{background:linear-gradient(180deg,rgba(34,211,238,.13),rgba(37,99,235,.12));box-shadow:inset 0 0 0 1px rgba(34,211,238,.18)}
.side{background:rgba(12,19,31,.88);border-right-color:var(--line)}
.side-head{padding:18px;border-bottom-color:var(--line)}
.metrics{gap:10px;margin-bottom:16px}
.metric{padding:14px;border-radius:14px;background:linear-gradient(180deg,rgba(24,37,57,.94),rgba(16,26,42,.94));transition:transform .16s ease,border-color .16s ease}
.metric:hover{transform:translateY(-1px);border-color:rgba(34,211,238,.22)}
.metric b{font-size:26px;line-height:1}.metric span{font-size:11.5px}
.search{height:46px;border-radius:14px;font-size:14px}
.tab{height:40px;border-radius:12px}.tab.on{background:rgba(34,211,238,.12);color:#dff9ff}
.ticket{grid-template-columns:48px minmax(0,1fr) auto;gap:12px;padding:15px 16px;transition:background .14s ease,transform .14s ease}
.ticket:hover{transform:translateX(2px)}
.ticket.on{background:linear-gradient(90deg,rgba(34,211,238,.12),rgba(37,99,235,.06))}
.avatar{width:48px;height:48px;border-radius:15px}.tname{font-size:15px}.tlast{font-size:13px}.time{font-size:11.5px}
.main{background:linear-gradient(180deg,rgba(8,13,22,.7),rgba(7,11,18,.95))}
.welcome h2{font-size:34px}.welcome p{font-size:16px}
.chat-head{height:76px;padding:0 22px;background:rgba(12,19,31,.78);border-bottom-color:var(--line)}
.chat-title b{font-size:17px}.chat-title span{font-size:12.5px}
.msgs{padding:22px;gap:8px;background:linear-gradient(180deg,rgba(255,255,255,.015),transparent 160px)}
.msg{max-width:min(760px,76%);animation:adminMsg .18s ease both}
@keyframes adminMsg{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:none}}
.bubble{padding:12px 14px;border-radius:18px;background:linear-gradient(180deg,rgba(22,34,52,.94),rgba(16,26,42,.94));box-shadow:0 10px 28px rgba(0,0,0,.18)}
.out .bubble{background:linear-gradient(135deg,rgba(37,99,235,.92),rgba(8,145,178,.9))}
.sender{font-size:12.5px;color:#67e8f9}.meta{font-size:11.5px}
.composer{padding:16px 22px;background:rgba(12,19,31,.9);border-top-color:var(--line)}
.compose-row{gap:12px}.quick,.send{width:48px;height:48px;border-radius:15px}
.send{background:linear-gradient(135deg,#22d3ee,#2563eb);color:#f8fbff}
.composer textarea{min-height:48px;border-radius:15px;font-size:15px}
.panel{padding:28px;scrollbar-color:rgba(148,163,184,.3) transparent}
.section{max-width:1180px}.section h2{font-size:31px}.section p{font-size:15px}
.grid{gap:16px}.card{border-radius:14px;padding:18px;background:linear-gradient(180deg,rgba(15,24,39,.94),rgba(11,18,30,.94))}
.field input,.field textarea,.field select{border-radius:13px;padding:12px 13px}
.pop{border-radius:18px;background:linear-gradient(180deg,rgba(15,24,39,.98),rgba(11,18,30,.98))}
.toast{bottom:28px;border-radius:14px;background:rgba(12,19,31,.96)}
@media(max-width:980px){.workspace{grid-template-columns:70px minmax(300px,1fr)}.main{inset:72px 0 0 70px}.top{height:72px}.rail{padding:10px 5px}.navbtn{width:58px}.top .brand p,.status span{display:none}}
@media(max-width:560px){.top{height:64px;padding:0 12px}.workspace{display:block}.side{inset:64px 0 70px 0}.main{inset:64px 0 70px 0}.rail{height:70px}.msg{max-width:90%}.msgs{padding:14px 10px}.chat-head{height:68px;padding:0 12px}.composer{padding:12px 10px}.panel{padding:18px 12px}.welcome h2{font-size:26px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.01ms!important}}
</style>
</head>
