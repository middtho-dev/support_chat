<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Админка поддержки — KV9RU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}html,body{height:100%;margin:0}button,input,textarea,select{font:inherit}
:root{--bg:#0b0f14;--panel:#121821;--panel2:#17202b;--panel3:#202b38;--line:rgba(255,255,255,.08);--text:#eef4fb;--muted:#8793a3;--soft:#b8c2cf;--blue:#38bdf8;--blue2:#0ea5e9;--green:#34d399;--red:#fb7185;--amber:#fbbf24;--violet:#a78bfa;--shadow:0 18px 60px rgba(0,0,0,.36)}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0b0f14,#0f141b 42%,#0b0f14);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}
button{border:0;cursor:pointer;color:inherit}button:disabled{cursor:not-allowed;opacity:.55}input,textarea,select{border:1px solid var(--line);background:var(--panel2);color:var(--text);outline:none}input:focus,textarea:focus,select:focus{border-color:rgba(56,189,248,.7);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
.auth{position:fixed;inset:0;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 30% 20%,rgba(56,189,248,.18),transparent 34%),radial-gradient(circle at 70% 70%,rgba(167,139,250,.13),transparent 32%),var(--bg);z-index:20}.auth-card{width:min(380px,100%);padding:30px;border:1px solid var(--line);border-radius:18px;background:rgba(18,24,33,.88);box-shadow:var(--shadow);backdrop-filter:blur(18px)}.brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--violet));display:grid;place-items:center;font-weight:800;color:#061018}.brand h1{font-size:20px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:13px}.auth-card input{width:100%;height:46px;border-radius:12px;padding:0 14px}.auth-card button{width:100%;height:46px;margin-top:12px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#041018;font-weight:800}.err{min-height:18px;margin-top:10px;color:var(--red);font-size:13px}
.app{height:100vh;display:none;grid-template-rows:64px minmax(0,1fr)}.top{display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);background:rgba(11,15,20,.8);backdrop-filter:blur(16px)}.top .brand{margin:0}.top .logo{width:36px;height:36px;border-radius:10px}.top h1{font-size:15px}.top p{font-size:12px}.spacer{flex:1}.status{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}.dot{width:9px;height:9px;border-radius:50%;background:var(--amber)}.dot.on{background:var(--green);box-shadow:0 0 0 5px rgba(52,211,153,.11)}.dot.off{background:var(--red)}.ghost{height:38px;padding:0 14px;border-radius:10px;background:transparent;border:1px solid var(--line);color:var(--soft);font-weight:700}.ghost:hover{background:var(--panel2);color:var(--text)}
.workspace{display:grid;grid-template-columns:78px 360px minmax(0,1fr);min-height:0}.rail{padding:12px 10px;border-right:1px solid var(--line);background:rgba(18,24,33,.82)}.navbtn{width:58px;height:54px;border-radius:14px;background:transparent;color:var(--muted);display:grid;place-items:center;margin-bottom:8px;position:relative}.navbtn svg{width:22px;height:22px}.navbtn.on{background:var(--panel2);color:var(--blue)}.navbtn.on::before{content:"";position:absolute;left:-10px;width:3px;height:24px;border-radius:3px;background:var(--blue)}.side{min-width:0;border-right:1px solid var(--line);background:rgba(18,24,33,.78);display:flex;flex-direction:column}.side-head{padding:16px;border-bottom:1px solid var(--line)}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}.metric{padding:12px;border-radius:12px;background:var(--panel2);border:1px solid var(--line)}.metric b{display:block;font-size:22px}.metric span{font-size:11px;color:var(--muted)}.search{width:100%;height:42px;border-radius:12px;padding:0 13px;margin-bottom:10px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.tab{height:34px;border-radius:10px;background:transparent;color:var(--muted);font-size:13px;font-weight:700}.tab.on{background:var(--panel3);color:var(--text)}.tickets{overflow:auto;min-height:0}.ticket{display:grid;grid-template-columns:44px minmax(0,1fr) auto;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line);background:transparent}.ticket:hover,.ticket.on{background:rgba(56,189,248,.07)}.avatar{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-weight:800;color:white;position:relative}.avatar::after{content:"";position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--panel);background:var(--green)}.avatar.closed::after{background:var(--red)}.avatar.wait::after{background:var(--amber)}.tname{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tlast{margin-top:3px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.time{font-size:11px;color:var(--muted);white-space:nowrap}.badge{margin-top:6px;min-width:20px;height:20px;padding:0 6px;border-radius:99px;background:var(--blue);color:#041018;font-size:11px;font-weight:800;display:grid;place-items:center}.empty{padding:34px 18px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5}
.main{min-width:0;min-height:0;display:flex;flex-direction:column}.welcome{height:100%;display:grid;place-items:center;text-align:center;color:var(--muted);padding:24px}.welcome h2{margin:0 0 8px;color:var(--text);font-size:28px}.chat{display:none;min-height:0;flex:1;flex-direction:column}.chat-head{height:68px;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--line);background:rgba(18,24,33,.64)}.back{display:none;width:38px;height:38px;border-radius:12px;background:var(--panel2)}.chat-title{min-width:0;flex:1}.chat-title b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat-title span{display:block;margin-top:3px;color:var(--muted);font-size:12px}.danger{height:38px;padding:0 14px;border-radius:10px;background:rgba(251,113,133,.1);color:var(--red);border:1px solid rgba(251,113,133,.25);font-weight:800}.okbtn{height:38px;padding:0 14px;border-radius:10px;background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.25);font-weight:800}.msgs{flex:1;min-height:0;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:6px}.day{align-self:center;margin:8px 0;padding:5px 10px;border-radius:99px;background:var(--panel2);color:var(--muted);font-size:12px}.msg{max-width:min(680px,74%);animation:pop .12s ease}.msg.in{align-self:flex-start}.msg.out{align-self:flex-end}.msg.sys{align-self:center;max-width:88%}.bubble{padding:10px 12px;border-radius:16px;background:var(--panel2);border:1px solid var(--line);line-height:1.48;word-break:break-word}.out .bubble{background:linear-gradient(135deg,#0f6f9c,#125f9a);border-color:rgba(255,255,255,.08)}.sys .bubble{font-size:12px;color:var(--muted);padding:6px 12px}.sender{font-size:12px;color:var(--blue);font-weight:800;margin-bottom:4px}.meta{text-align:right;color:rgba(238,244,251,.56);font-size:11px;margin-top:4px}.bubble img,.bubble video{max-width:280px;max-height:260px;border-radius:12px;display:block}.bubble audio{max-width:280px}.file{display:flex;gap:10px;align-items:center;color:inherit;text-decoration:none}.file-ico{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;background:rgba(56,189,248,.15);color:var(--blue)}.composer{padding:14px 18px;border-top:1px solid var(--line);background:rgba(18,24,33,.78)}.typing{display:none;color:var(--muted);font-size:12px;margin-bottom:8px}.compose-row{display:flex;gap:10px;align-items:flex-end}.quick{width:42px;height:42px;border-radius:13px;background:var(--panel2);border:1px solid var(--line);color:var(--blue);font-weight:800}.composer textarea{flex:1;min-height:42px;max-height:140px;border-radius:13px;padding:11px 13px;resize:none}.send{width:42px;height:42px;border-radius:13px;background:var(--blue);color:#041018;font-weight:900}.hint{display:flex;justify-content:space-between;margin-top:7px;color:var(--muted);font-size:11px}.closed-note{padding:16px;text-align:center;color:var(--red);background:rgba(251,113,133,.06);border-top:1px solid rgba(251,113,133,.18)}
.panel{display:none;min-height:0;overflow:auto;padding:20px}.panel.on{display:block}.section{max-width:980px}.section h2{margin:0 0 6px;font-size:26px}.section p{margin:0 0 18px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:rgba(18,24,33,.86);border:1px solid var(--line);border-radius:16px;padding:16px}.card h3{margin:0 0 12px;font-size:16px}.field{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}.field label,.check{font-size:13px;color:var(--soft);font-weight:700}.field input,.field textarea,.field select{width:100%;border-radius:12px;padding:10px 12px}.field textarea{min-height:90px;resize:vertical}.check{display:flex;align-items:center;gap:9px}.check input{width:18px;height:18px}.save{height:40px;padding:0 16px;border-radius:12px;background:var(--green);color:#041018;font-weight:900}.template-list{display:flex;flex-direction:column;gap:10px}.tpl{display:grid;grid-template-columns:160px minmax(0,1fr) auto;gap:10px}.tpl input{height:40px;border-radius:11px;padding:0 10px}.tpl button{width:40px;border-radius:11px;background:rgba(251,113,133,.12);color:var(--red)}.add{height:40px;padding:0 14px;border-radius:12px;background:var(--panel3);color:var(--text);font-weight:800}.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,12px);opacity:0;transition:.18s ease;padding:10px 14px;border-radius:99px;background:rgba(18,24,33,.95);border:1px solid var(--line);box-shadow:var(--shadow);color:var(--text);font-size:13px;z-index:30}.toast.on{opacity:1;transform:translate(-50%,0)}.pop{position:fixed;z-index:25;width:min(420px,calc(100vw - 24px));max-height:360px;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:8px}.pop button{display:block;width:100%;text-align:left;background:transparent;border-radius:12px;padding:10px}.pop button:hover{background:var(--panel2)}.pop b{display:block;color:var(--blue);font-size:12px}.pop span{display:block;margin-top:3px;color:var(--soft);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}@keyframes pop{from{opacity:.3;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(max-width:900px){.workspace{grid-template-columns:64px minmax(0,1fr)}.main{position:fixed;inset:64px 0 0 64px;background:var(--bg);display:none;z-index:8}.main.open{display:flex}.back{display:grid}.side{border-right:0}.grid{grid-template-columns:1fr}.tpl{grid-template-columns:1fr}.tpl button{width:100%;height:38px}.top .brand p,.status span{display:none}}
@media(max-width:560px){.workspace{grid-template-columns:1fr}.rail{position:fixed;left:0;right:0;bottom:0;height:66px;display:flex;justify-content:center;z-index:12;border-right:0;border-top:1px solid var(--line);padding:7px;background:var(--panel)}.navbtn{margin:0 4px;width:58px;height:50px}.navbtn.on::before{display:none}.side{padding-bottom:66px}.main{inset:64px 0 66px 0}.metrics{grid-template-columns:repeat(3,1fr)}.metric{padding:9px}.msg{max-width:88%}.chat-head{padding:0 12px}.top{padding:0 12px}.ghost{padding:0 10px}}
</style>
</head>
<body>
<div id="login" class="auth"><form class="auth-card" id="login-form"><div class="brand"><div class="logo">KV</div><div><h1>Админка поддержки</h1><p>Диалоги, настройки и шаблоны ответов</p></div></div><input id="tok" type="password" placeholder="ADMIN_TOKEN" autocomplete="current-password"><button id="lbtn" type="submit">Войти</button><div id="lerr" class="err"></div></form></div>
<div id="app" class="app">
  <header class="top"><div class="brand"><div class="logo">KV</div><div><h1>KV9RU Support</h1><p>Панель оператора</p></div></div><div class="spacer"></div><div class="status"><i id="cdot" class="dot"></i><span id="ctxt">подключение</span></div><button id="logout-btn" class="ghost">Выйти</button></header>
  <div class="workspace">
    <nav class="rail">
      <button class="navbtn on" data-view="chat" title="Диалоги"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg></button>
      <button class="navbtn" data-view="settings" title="Настройки"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.43.17.78.5 1 .9.18.34.36.7.7.7H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.5.4Z"/></svg></button>
      <button class="navbtn" data-view="templates" title="Шаблоны"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg></button>
    </nav>
    <aside class="side" id="side"><div class="side-head"><div class="metrics"><div class="metric"><b id="m-open">0</b><span>открыто</span></div><div class="metric"><b id="m-unread">0</b><span>новых</span></div><div class="metric"><b id="m-all">0</b><span>всего</span></div></div><input id="srch" class="search" type="search" placeholder="Поиск по имени или ID"><div class="tabs"><button class="tab on" data-tab="open">Открытые</button><button class="tab" data-tab="closed">Закрытые</button><button class="tab" data-tab="all">Все</button></div></div><div id="tlist" class="tickets"></div></aside>
    <main class="main" id="main"><section id="welcome" class="welcome"><div><h2>Выберите диалог</h2><p>Слева заявки, сверху метрики, в настройках управление графиком и текстами вне рабочего времени.</p></div></section><section id="chat" class="chat"><div class="chat-head"><button id="back" class="back">‹</button><div id="cv-av" class="avatar"></div><div class="chat-title"><b id="cv-name">—</b><span id="cv-sub">—</span></div><button id="cv-toggle" class="danger">Закрыть</button></div><div id="cv-msgs" class="msgs"></div><div id="typing" class="typing">Пользователь печатает...</div><div id="composer" class="composer"><div class="compose-row"><button id="quick" class="quick" title="Шаблоны">#</button><textarea id="reply-txt" rows="1" placeholder="Ответ операторa..."></textarea><button id="reply-send" class="send" disabled>➤</button></div><div class="hint"><span>Ctrl+Enter — отправить</span><span id="reply-cnt"></span></div></div></section><section id="settings" class="panel"></section><section id="templates" class="panel"></section></main>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
