services:
  support-chat:
    build: .
    container_name: support-chat
    restart: unless-stopped
    network_mode: host
    init: true
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3001}
      - DB_PATH=/app/data/support.db
      - UPLOADS_DIR=/app/public/uploads
      - VAPID_STORE=/app/data/vapid.json
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_EMAIL=${VAPID_EMAIL:-support@example.com}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:$$PORT/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - support-data:/app/data
      - support-uploads:/app/public/uploads

volumes:
  support-data:
  support-uploads:
